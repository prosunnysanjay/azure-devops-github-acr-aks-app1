# Stages
# Stage-1:
  # Task-1: Build Docker Image and push to Azure Container Registry ACR
  # Task-2: Copy kube-manifest files to Build Artifact Directory
  # Task-3: Publish build articats to Azure Pipelines
# Pipeline Hierarchial Flow: Stages -> Stage -> Jobs -> Job -> Steps -> Task1, Task2, Task3 

trigger:
- master

#Variables
variables:
  tag: '$(Build.BuildId)'

stages:
#Build Stage
  - stage: Build
    displayName: Build Job
    jobs:
      - job: Build
        displayName: Build Job
        pool:
          name: Default
        steps:
          # Task-1: Build Docker Image and push to Azure Container Registry ACR
          - task: Docker@2
            inputs:
              containerRegistry: 'manual-aksdevopsacr-svc'
              repository: 'manual-aksdevopsacr-svc'
              command: 'buildAndPush'
              Dockerfile: '**/Dockerfile'
              tags:
                $(tag)
                
          # Task-2: Copy kube-manifest files to Build Artifact Directory
          
          - powershell: Write-Host "Contents:" Get-ChildItem -Recurse $(System.DefaultWorkingDirectory)     
          - powershell: Write-Host "Contents:" Get-ChildItem -Recurse $(Build.ArtifactStagingDirectory)
          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(System.DefaultWorkingDirectory)/kube-manifests'
              Contents: '**'
              TargetFolder: '$(Build.ArtifactStagingDirectory)'
              OverWrite: true
          - powershell: Write-Host "Contents:" Get-ChildItem -Recurse $(Build.ArtifactStagingDirectory)
          # Task-3: Publish build articats to Azure Pipelines
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'kube-manifests'
              publishLocation: 'Container'
